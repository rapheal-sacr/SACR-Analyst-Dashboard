# Deploy container to Cloud Run on push to main.
# One-time GCP + GitHub secrets: see .github/GITHUB_DEPLOY_SETUP.md
name: Deploy to Cloud Run

on:
  push:
    branches: [main]

concurrency:
  group: deploy-cloud-run-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: us-central1
  SERVICE: sacr-dashboard
  AR_REPOSITORY: sacr-docker
  IMAGE_NAME: sacr-dashboard

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          REGISTRY="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}"
          docker build --platform linux/amd64 -t "${REGISTRY}:${GITHUB_SHA}" -t "${REGISTRY}:latest" .
          docker push "${REGISTRY}:${GITHUB_SHA}"
          docker push "${REGISTRY}:latest"

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --project="${PROJECT_ID}" \
            --region="${{ env.REGION }}" \
            --image="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
