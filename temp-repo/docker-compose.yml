services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    # Port 4000 serves client/dist; rebuild client on start so UI matches source (.env VITE_* baked in).
    command: sh -c "pnpm install && pnpm --filter client build && pnpm --filter server dev"
    env_file:
      - .env
    environment:
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/adc.json
    volumes:
      - ./:/workspace
      - /workspace/node_modules
      - /workspace/client/node_modules
      - /workspace/server/node_modules
      - ${HOME}/.config/gcloud/application_default_credentials.json:/tmp/adc.json:ro
    ports:
      - "4000:4000"

  client:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    command: sh -c "pnpm install && pnpm --filter client dev -- --host 0.0.0.0 --port 5173"
    environment:
      # Browser calls /api on :5173; Vite must proxy to the server service, not localhost.
      API_PROXY_TARGET: http://server:4000
    depends_on:
      - server
    volumes:
      - ./:/workspace
      - /workspace/node_modules
      - /workspace/client/node_modules
      - /workspace/server/node_modules
    ports:
      - "5173:5173"
